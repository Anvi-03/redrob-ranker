ai_usage_summary: |
  Used Claude for architecture discussion, feature engineering design, and code review.
  Used GitHub Copilot for autocomplete during implementation.
  No candidate data was passed to any external LLM during the ranking step.
  All ranking inference runs locally, offline, with no network calls.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Two-phase hybrid ranking system: offline pre-computation + online constrained ranking.

  Phase A (Offline): All 100,000 candidate profiles are embedded using a local
  sentence-transformer (BAAI/bge-small-en-v1.5) into 384-dim vectors and indexed
  via FAISS. Structured features are extracted per candidate — title seniority,
  career-corroborated skill trust score (proficiency × endorsements × duration,
  with recency decay), company-type classification (product vs. consulting),
  experience band fit, location match, and behavioral engagement signals from
  the 23 redrob_signals fields. Honeypot consistency checks run here too.

  Phase B (Online, ≤5 min / CPU): FAISS retrieves top-1,500 candidates by
  semantic similarity. Hard disqualifiers (pure-consulting, no-ML-domain,
  keyword-stuffing detected via career-corroboration mismatch) are applied as
  pre-filters. A LightGBM LambdaMART re-ranker, trained on hand-labeled
  relevance data (0–3 scale), combines all feature signals into a final score.
  Behavioral signals apply as a 0.5–1.2× multiplier. Top-100 selected with
  template-based, per-candidate reasoning text. Runtime: ~45 seconds on CPU.

