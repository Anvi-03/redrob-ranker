# Scoring weights configuration for candidate ranking
# These weights control the relative importance of each scoring dimension.

weights:
  semantic_similarity: 0.30
  skills_match: 0.20
  experience_relevance: 0.15
  career_trajectory: 0.10
  recency: 0.05
  engagement_signals: 0.05
  location_fit: 0.05
  honeypot_penalty: 0.10

thresholds:
  honeypot_flag: 0.65
  minimum_score: 0.15
  strong_fit: 0.75
  borderline_low: 0.40
  borderline_high: 0.60

embedding_model: "all-MiniLM-L6-v2"
finetuned_model_path: "artifacts/finetuned-embedder"
